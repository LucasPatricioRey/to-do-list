<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <p class="eyebrow">Organizador personal</p>
    <h1>To-Do List</h1>
    <p class="subtitle">Crea tareas, filtralas y guarda el progreso en tu navegador.</p>

    <div class="input-container">
      <label class="sr-only" for="taskInput">Nueva tarea</label>
      <input type="text" id="taskInput" placeholder="Escribi una tarea...">
      <button type="button" id="addBtn">Agregar</button>
    </div>

    <div class="filters" aria-label="Filtros de tareas">
      <button type="button" class="is-active" data-filter="all">Todas</button>
      <button type="button" data-filter="pending">Pendientes</button>
      <button type="button" data-filter="done">Completadas</button>
    </div>

    <ul id="taskList" aria-live="polite"></ul>

    <div class="counter">
      <span id="total">Total: 0</span>
      <span id="pending">Pendientes: 0</span>
      <span id="done">Hechas: 0</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
